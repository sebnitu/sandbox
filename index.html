<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Vue.js</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://sebnitu.com//dist/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/vrembem/dist/styles.min.css">
</head>
<body>
  <div id="app">

    <div class="section">
      <div class="container spacing">
        <h1>Learning Vue.js</h1>
        <p>A place for me to learn Vue.js. This branch follows the <a class="link" href="https://www.youtube.com/playlist?list=PL55RiY5tL51p-YU-Uw90qQH419BM4Iz07">Vue.js Getting Started</a> YouTube tutorial by <a class="link" href="https://www.youtube.com/channel/UCSJbGtTlrDami-tDGPUV9-w">Academind</a>.</p>
        <div>
          <ol class="breadcrumb">
            <li class="breadcrumb__item">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
              <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox">
                <span>sandbox</span>
              </a>
            </li>
            <li class="breadcrumb__item">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-git-branch"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
              <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox/tree/learning-vue-js">
                <span>learning-vue-js</span>
              </a>
            </li>
          </ol>
        </div>
        <hr class="sep margin-vert-xl">
        <button @click="show = !show" class="button">Toggle</button>
        <div v-if="show" class="notice notice_type_info">
          <p>1st notice...</p>
        </div>
        <div v-else class="notice notice_type_success">
          <p>2nd notice...</p>
        </div>
        <div v-show="show" class="notice notice_type_caution">
          <p>3rd notice...</p>
        </div>
        <hr class="sep">
        <table class="table table_style_bordered" style="width: auto;">
          <tr>
            <th>#</th>
            <th>First</th>
            <th>Last</th>
          </tr>
          <tr v-for="person in persons">
            <td>{{ person.id }}</td>
            <td>{{ person.first }}</td>
            <td>{{ person.last }}</td>
          </tr>
        </table>
      </div>
    </div>

  </div>
  <script src="https://unpkg.com/vrembem/dist/scripts.min.js"></script>
  <script src="https://unpkg.com/vue/dist/vue.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        show: true,
        persons: [
          { first: 'Noam', last: 'Chomsky', id: 101 },
          { first: 'Emma', last: 'Goldman', id: 102 },
          { first: 'Howard', last: 'Zinn', id: 103 },
          { first: 'Peirre', last: 'Proudhon', id: 104 },
        ]
      }
    });
  </script>
</body>
</html>
