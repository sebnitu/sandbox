<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Vue</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://sebnitu.com//dist/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/vrembem/dist/styles.min.css">
  <style>
    .list-style-none {
      list-style: none !important;
    }
  </style>
</head>
<body>

  <section id="app" rol="main">
    <header class="section background-shade">
      <div class="container spacing">
        <h1 class="text-size-lg">Learning Vue</h1>
        <p>A place for me to learn and play with Vue.</p>
        <div>
          <ol class="breadcrumb">
            <li class="breadcrumb__item">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
              <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox">
                <span>sandbox</span>
              </a>
            </li>
            <li class="breadcrumb__item">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-git-branch"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
              <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox/tree/learning-vue">
                <span>learning-vue</span>
              </a>
            </li>
          </ol>
        </div>
      </div>
    </header>

    <div class="section">
      <div class="container spacing-xl">
        <div>
          <div class="grid">
            <div class="grid__item span-8">
              <product v-bind:premium="premium" @add-to-cart="addToCart"></product>
            </div>
            <div class="grid__item span-1 border-right"></div>
            <div class="grid__item span-3">
              <cart :cart="cart" @remove-from-cart="removeFromCart" @clear-cart="clearCart"></cart>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/vrembem/dist/scripts.min.js"></script>
  <script src="https://unpkg.com/vue/dist/vue.js"></script>
  <script>

    Vue.component('notice', {
      props: {
        message: String,
        type: String
      },
      computed: {
        noticeType() {
          return `notice_type_${this.type}`;
        }
      },
      template: `
      <div class="notice" v-bind:class="noticeType">
        {{ message }}
      </div>
      `
    });

    Vue.component('cart', {
      props: {
        cart: {
          type: Array,
          required: true
        }
      },
      methods: {
        removeFromCart() {
          const lastItem = this.cart[this.cart.length - 1];
          this.$emit('remove-from-cart', lastItem);
        },
        clearCart() {
          this.$emit('clear-cart');
        }
      },
      template: `
      <div class="padding border radius spacing">
        <p>Cart: {{ cart.length }}</p>
        <hr class="sep" />
        <div>
          <div class="level flex-justify-between">
            <button class="link" v-on:click="removeFromCart">
              Remove item
            </button>
            <button class="link" v-on:click="clearCart">
              Clear cart
            </button>
          </div>
        </div>
      </div>
      `
    });

    Vue.component('radio', {
      props: ['label', 'name', 'value'],
      methods: {
        onChange(value) {
          this.$emit('change', value);
        }
      },
      template: `
      <label>
        <span class="radio">
          <input type="radio" class="radio__native" 
            :value="value" 
            :name="name" 
            v-on:change="onChange($event.target.value)"
          >
          <span class="radio__background">
            <span class="radio__circle">
              <span class="radio__dot"></span>
            </span>
          </span>
        </span>
        {{ label }}
      </label>
      `
    });

    Vue.component('product-review', {
      props: {
        reviews: Array
      },
      template: `
      <div class="spacing">
        <h2 class="text-size-lg">Reviews</h2>
        <p v-if="!reviews.length">There are no reviews yet.</p>
        <ul v-else class="list-style-none spacing">
          <li v-for="review in reviews" class="background-primary-lighter padding border radius spacing-sm">
            <div class="display-flex flex-justify-between flex-align-center">
              <h3>Name: {{ review.name }}</h3>
              <p>Rating: {{ review.rating }}/5</p>
            </div>
            <p>They said: "{{ review.comment }}"</p>
            <p>Would I recommend this product? {{ review.recommend }}</p>
          </li>
        </ul>
      </div>
      `
    });

    Vue.component('product-review-form', {
      data() {
        return {
          name: null,
          rating: null,
          comment: null,
          recommend: null,
          errors: []
        }
      },
      methods: {
        updateRating(value) {
          this.rating = value;
        },
        updateRecommend(value) {
          this.recommend = value;
        },
        onSubmit() {
          this.errors = [];
          if (this.name && this.rating && this.comment && this.recommend) {
            const productReview = {
              name: this.name,
              rating: this.rating,
              comment: this.comment,
              recommend: this.recommend
            }
            this.$emit('add-review', productReview);
            this.name = null;
            this.rating = null;
            this.comment = null;
            this.recommend = null;
            document.querySelectorAll('input[name="rating"], input[name="recommend"]').forEach((el) => {
              el.checked = false;
            });
          } else {
            if (!this.name) this.errors.push('Name is required.');
            if (!this.rating) this.errors.push('Rating is required.');
            if (!this.comment) this.errors.push('Comment is required.');
            if (!this.recommend) this.errors.push('Recommend question is required.');
          }
        }
      },
      template: `
      <form class="spacing" @submit.prevent="onSubmit">
        <h2 class="text-size-lg">Add Review</h2>

        <div v-if="errors.length" class="notice notice_type_danger">
          <div class="notice__body">
            <p>Review could not be submitted due to the following error(s):</p>
            <ul class="list">
              <li v-for="error in errors">{{ error }}</li>
            </ul>
          </div>
        </div>

        <label class="display-block spacing-sm">
          <span>Name</span>
          <input class="input" v-model="name" />
        </label>

        <div class="spacing-sm">
          <label>Rating</label>
          <div>
            <div class="level level_gap_lg">
              <radio label="1" value="1" name="rating" @change="updateRating"></radio>
              <radio label="2" value="2" name="rating" @change="updateRating"></radio>
              <radio label="3" value="3" name="rating" @change="updateRating"></radio>
              <radio label="4" value="4" name="rating" @change="updateRating"></radio>
              <radio label="5" value="5" name="rating" @change="updateRating"></radio>
            </div>
          </div>
        </div>

        <label class="display-block spacing-sm">
          <span>Comment</span>
          <textarea class="input input_type_textarea" v-model="comment" rows="3"></textarea>
        </label>

        <div class="spacing-sm">
          <label>Would you recommend this product?</label>
          <div>
            <div class="level level_gap_lg">
              <radio label="Yes" value="👍" name="recommend" @change="updateRecommend"></radio>
              <radio label="No" value="👎" name="recommend" @change="updateRecommend"></radio>
            </div>
          </div>
        </div>

        <div>
          <button class="button button_color_secondary">
            Submit Review
          </button>  
        </div>
      </form>
      `
    });

    Vue.component('product-details', {
      props: {
        details: {
          type: Array,
          required: true
        }
      },
      template: `
      <div class="spacing-sm">
        <h3>Product Details</h3>
        <ul class="list">
          <li v-for="detail in details">{{ detail }}</li>
        </ul>
      </div>
      `
    });

    Vue.component('product', {
      props: {
        premium: {
          type: Boolean,
          required: true
        }
      },
      data() {
        return {
          product: 'The Legend of Zelda',
          selectedVariant: 0,
          onSaleClass: 'notice_type_success',
          box: {
            styleObject: {
              width: '32px',
              height: '32px'
            }
          },
          controllers: [
            {
              styleObject: {
                backgroundColor: 'black',
              }
            },
            {
              styleObject: {
                backgroundColor: 'gray'
              }
            },
            {
              styleObject: {
                backgroundColor: 'gold'
              }
            }
          ],
          variants: [
            {
              id: 1001,
              title: 'Ocarina of Time',
              img: './img/zelda-oot.jpg',
              inventory: 100,
              onSale: false,
              details: [
                'Only for Nintendo 64',
                'Rumble pack included',
                'Navi will be your companion'
              ]
            },
            {
              id: 1002,
              title: 'Majora\'s Mask',
              img: './img/zelda-mm.jpg',
              inventory: 200,
              onSale: true,
              details: [
                'Only for Nintendo 64',
                'Expansion pack required',
                'Search for your companion, Navi'
              ]
            }
          ],
          addNumber: 1,
          reviews: []
        }
      },
      computed: {
        title() {
          return this.product + ": " + this.variants[this.selectedVariant].title;
        },
        img() {
          return this.variants[this.selectedVariant].img;
        },
        inventory() {
          return this.variants[this.selectedVariant].inventory;
        },
        details() {
          return this.variants[this.selectedVariant].details;
        },
        onSale() {
          return this.variants[this.selectedVariant].onSale;
        },
        onSaleText() {
          let result;
          if (this.onSale) {
            result = `😄 ${this.title} is on sale!`;
          } else {
            result = `😒 ${this.title} is not on sale.`;
          }
          return result;
        },
        shipping() {
          return (this.premium) ? 'Free!' : '$2.99';
        }
      },
      methods: {
        addToCart() {
          const result = this.variants[this.selectedVariant].inventory - parseInt(this.addNumber);
          if (result >= 0) {
            this.variants[this.selectedVariant].inventory = result;
            this.$emit('add-to-cart', this.variants[this.selectedVariant].id, parseInt(this.addNumber));
          }
        },
        changeVariant(event) {
          this.selectedVariant = event.target.value;
        },
        toggleSale() {
          this.variants[this.selectedVariant].onSale =
            (this.variants[this.selectedVariant].onSale) ? false : true;
        },
        addReview(review) {
          this.reviews.push(review);
        }
      },
      template: `
      <div class="grid">
        <div class="grid__item span-12">
          <div class="notice" v-bind:class="[onSale ? onSaleClass : '']">
            <div class="notice__body">
              <p>{{ onSaleText }}</p>
            </div>
            <button
              class="button"
              v-on:click="toggleSale">
              <span v-if="onSale">Off</span>
              <span v-else>On</span>
            </button>
          </div>
        </div>
        <div class="grid__item span-4 spacing">
          <img class="display-block radius" v-bind:src="img" alt="" />
          <p>
            <a class="link" v-bind:href="img">Download cover art</a>
          </p>
        </div>
        <div class="grid__item span-8 spacing">

          <h2 class="text-size-lg">{{ title }}</h2>
          
          <hr class="sep" />

          <label class="display-block">
            <div class="text-bold margin-bottom-sm">Variant</div>
            <select class="input input_type_select" name="variant" v-on:change="changeVariant($event)">
              <option 
                v-for="(variant, index) in variants" 
                v-bind:value="index">
                {{ variant.title }}
              </option>
            </select>
          </label>

          <product-details :details="details"></product-details>

          <div class="spacing-sm">
            <h3>Controller Options</h3>
            <div>
              <div class="level level_gap_sm">
                <div
                  class="radius" 
                  v-for="controller in controllers"
                  v-bind:style="[box.styleObject, controller.styleObject]"
                  v-on:click=""></div>
              </div>
            </div>
          </div>

          <p> Shipping: {{ shipping }}</p>

          <hr class="sep" />
          
          <p v-bind:class="{ 
            'color-success': inventory >= 10,
            'color-caution': inventory > 0 && inventory < 10,
            'color-danger': !inventory,
          }">
            <span v-if="inventory >= 10">
              {{ inventory }} In stock
            </span>
            <span v-else-if="inventory > 0 && inventory < 10">
              Only {{ inventory }} left stock
            </span>
            <span v-else>
              Out of stock
            </span>
          </p>

          <div>
            <div class="level">
              <div>
                <input class="input" type="number" value="1" v-model="addNumber" style="width: 80px;">
              </div>
              <button 
                class="button button_color_primary"
                v-on:click="addToCart" 
                v-bind:disabled="inventory < 1">
                Add to Cart
              </button>
            </div>
          </div>

          <hr class="sep" />

          <div>
            <product-review :reviews="reviews"></product-review>
          </div>

          <hr class="sep" />

          <div>
            <product-review-form @add-review="addReview"></product-review-form>
          </div>

        </div>
      </div>
      `
    });

    const app = new Vue({
      el: '#app',
      data: {
        premium: true,
        cart: []
      },
      methods: {
        addToCart(id, amount) {
          for (let i = 0; i < amount; i++) {
            this.cart.push(id);
          }
        },
        removeFromCart(id) {
          if (this.cart.length) {
            const item = this.cart.findIndex((el) => {
              return el == id
            });
            if (item >= 0) {
              this.cart.splice(item, 1);
            }
            console.log(id); // Put this back into product inventory?
          }
        },
        clearCart() {
          console.log(this.cart); // Put these all back into product inventory?
          this.cart = [];
        }
      }
    });
  </script>
</body>
</html>
