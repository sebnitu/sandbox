<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://sebnitu.com//dist/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/vrembem/dist/styles.css">
</head>
<body>

  <header class="section background-shade">
    <div class="container gap-y-sm">
      <h1 class="text-size-lg">Forms</h1>
      <p>A place to learn and test HTML forms.</p>
      <div class="margin-top-lg">
        <ol class="breadcrumb">
          <li class="breadcrumb__item">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
            <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox">
              <span>sandbox</span>
            </a>
          </li>
          <li class="breadcrumb__item">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-git-branch"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
            <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox/tree/master">
              <span>master</span>
            </a>
          </li>
        </ol>
      </div>
    </div>
  </header>

  <main role="main" class="section">
    <form>
      <div class="container gap-y">

        <div>
          <label>
            <div class="margin-bottom-sm">First name</div>
            <input name="example[name][first]" value="" type="text" class="input" style="max-width: 300px">
          </label>
        </div>

        <div>
          <label>
            <div class="margin-bottom-sm">Last name</div>
            <input name="example[name][last]" value="" type="text" class="input" style="max-width: 300px">
          </label>
        </div>

        <div class="gap-y-xs">
          <div>
            <div class="level">
              <span class="checkbox">
                <input id="example_1" name="example[checkbox][]" value="1" type="checkbox" class="checkbox__native">
                <span class="checkbox__background">
                  <span class="checkbox__box">
                    <span class="checkbox__icon"></span>
                  </span>
                </span>
              </span>
              <label for="example_1">Example 1</label>
            </div>
          </div>

          <div>
            <div class="level">
              <span class="checkbox">
                <input id="example_2" name="example[checkbox][]" value="2" type="checkbox" class="checkbox__native">
                <span class="checkbox__background">
                  <span class="checkbox__box">
                    <span class="checkbox__icon"></span>
                  </span>
                </span>
              </span>
              <label for="example_2">Example 2</label>
            </div>
          </div>

          <div>
            <div class="level">
              <span class="checkbox">
                <input id="example_3" name="example[checkbox][]" value="3" type="checkbox" class="checkbox__native">
                <span class="checkbox__background">
                  <span class="checkbox__box">
                    <span class="checkbox__icon"></span>
                  </span>
                </span>
              </span>
              <label for="example_3">Example 3</label>
            </div>
          </div>
        </div>

        <div>
          <button type="submit" class="button button_color_primary">Submit</button>
        </div>

      </div>
    </form>
  </main>

  <script src="https://unpkg.com/vrembem"></script>
  <script>
    document.addEventListener('submit', function (event) {
      event.preventDefault();
      const data = new FormData(event.target);
      for (const entry of data) {
        console.log(entry);
      }
      console.log(data.getAll('example[checkbox][]'));
    });
  </script>
</body>
</html>
