<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Vue.js</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://sebnitu.com//dist/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/vrembem/dist/styles.min.css">
</head>
<body>
  <div id="app">

    <div class="section">
      <div class="container spacing">
        <h1>Learning Vue.js</h1>
        <p>{{ text }}</p>
        <p>
          <button @click="changeText" class="button">Change</button>
          <button @click="changeBack" class="button">Return</button>
        </p>
      </div>
    </div>

  </div>
  <script src="https://unpkg.com/vrembem/dist/scripts.min.js"></script>
  <script src="https://unpkg.com/vue/dist/vue.js"></script>
  <script>
    const defaultText = 'Hello, World!';
    new Vue({
      el: '#app',
      data: {
        text: defaultText
      },
      methods: {
        changeText() {
          this.text = 'Nice to meet you!';
        },
        changeBack() {
          this.text = defaultText;
        }
      }
    });
  </script>
</body>
</html>
