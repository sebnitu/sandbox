<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Vue.js</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://sebnitu.com//dist/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/vrembem/dist/styles.min.css">
</head>
<body>
  <div id="app">

    <div class="section">
      <div class="container spacing">
        <h1>Learning Vue.js</h1>
        <p>A place for me to learn Vue.js</p>
        <hr class="sep margin-vert-xl">
        <button @click="increment" class="button">Increment</button>
        <table class="table table_style_bordered" style="width: auto;">
          <tr>
            <th>Counter:</th>
            <th>Clicks:</th>
          </tr>
          <tr>
            <td>{{ counter }}</td>
            <td>{{ clicks }}</td>
          </tr>
        </table>
      </div>
    </div>

  </div>
  <script src="https://unpkg.com/vrembem/dist/scripts.min.js"></script>
  <script src="https://unpkg.com/vue/dist/vue.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        // counter: 0,
        clicks: 0
      },
      methods: {
        increment() {
          this.clicks++;
        }
      },
      computed: {
        counter() {
          return this.clicks * 2;
        }
      }
    });
  </script>
</body>
</html>
