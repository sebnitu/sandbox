<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Vue.js</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://sebnitu.com//dist/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/vrembem/dist/styles.min.css">
</head>
<body>

  <section id="app" rol="main">
    <header class="section background-shade">
      <div class="container spacing">
        <h1 class="text-size-lg">Learning Vue.js</h1>
        <p v-if="description">{{ description }}</p>
        <p></p>
        <div>
          <ol class="breadcrumb">
            <li class="breadcrumb__item">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-github"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
              <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox">
                <span>sandbox</span>
              </a>
            </li>
            <li class="breadcrumb__item">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-git-branch"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
              <a class="breadcrumb__link" href="https://github.com/sebnitu/sandbox/tree/learning-vue-js">
                <span>learning-vue-js</span>
              </a>
            </li>
          </ol>
        </div>
      </div>
    </header>

    <div class="section">
      <div class="container">

        <div class="grid">
          <div class="grid__item span-3">
            <img class="display-block radius" v-bind:src="img" alt="" />
            <p class="margin-top-sm">
              <a class="link" v-bind:href="img">Download cover art</a>
            </p>
          </div>
          <div class="grid__item span-5 spacing">
            <label>
              <div class="text-bold margin-bottom-sm">Version</div>
              <select class="input input_type_select" v-on:change="changeVersion($event)">
                <option 
                  v-for="variant in variants" 
                  v-bind:key="variant.variantId" 
                  v-bind:value="variant.variantId">
                  {{ variant.variantTitle }}
                </option>
              </select>
            </label>

            <h2>The Legend of Zelda: Ocarina of Time</h2>

            <ul class="list">
              <li v-for="detail in details">{{ detail }}</li>
            </ul>

            <div class="spacing-sm">
              <label class="text-bold">Controller Options</label>
              <div>
                <div class="level level_gap_sm">
                  <div 
                    v-for="controller in controllers"
                    v-bind:style="[box.styleObject, controller.styleObject]"
                    v-on:click=""></div>
                </div>
              </div>
            </div>

            <hr class="sep" />
            
            <p v-bind:class="{ 
              'color-success': inventory >= 10,
              'color-caution': inventory > 0 && inventory < 10,
              'color-danger': !inventory,
            }">
              <span v-if="inventory >= 10">
                {{ inventory }} In stock
              </span>
              <span v-else-if="inventory > 0 && inventory < 10">
                Only {{ inventory }} left stock
              </span>
              <span v-else>
                Out of stock
              </span>
            </p>

            <div>
              <div class="level">
                <div>
                  <input class="input" type="number" value="1" v-model="addNumber" style="width: 80px;">
                </div>
                <button 
                  class="button button_color_primary"
                  v-on:click="addToCart" 
                  v-bind:disabled="inventory < 1">
                  Add to Cart
                </button>
              </div>
            </div>

            <div class="notice" v-bind:class="[onSale ? onSaleClass : '']">
              <div class="notice__body">
                <p v-if="onSale">😄 This item is on sale!</p>
                <p v-else>😒 This item is not on sale.</p>
              </div>
              <button
                class="button"
                v-on:click="toggleSale">
                <span v-if="onSale">Off</span>
                <span v-else>On</span>
              </button>
            </div>

          </div>
          <div class="grid__item border-right"></div>
          <div class="grid__item span-3">
            <div class="padding border radius spacing">
              <p>Cart: {{ cart }}</p>
              <hr class="sep" />
              <div>
                <div class="level flex-justify-between">
                  <button class="link" v-on:click="removeFromCart">
                    Remove item
                  </button>
                  <button class="link" v-on:click="clearCart">
                    Clear cart
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="https://unpkg.com/vrembem/dist/scripts.min.js"></script>
  <script src="https://unpkg.com/vue/dist/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        title: 'Learning Vue.js',
        description: 'A place for me to learn and play with Vue.',
        img: './img/zelda-oot.jpg',
        inventory: 200,
        onSale: false,
        onSaleClass: 'notice_type_success',
        details: [
          'Only for Nintendo 64',
          'Rumble pack included',
          'Navi will be your companion'
        ],
        box: {
          styleObject: {
            width: '32px',
            height: '32px'
          }
        },
        controllers: [
          {
            styleObject: {
              backgroundColor: 'black',
            }
          },
          {
            styleObject: {
              backgroundColor: 'gray'
            }
          },
          {
            styleObject: {
              backgroundColor: 'gold'
            }
          }
        ],
        variants: [
          {
            variantId: 1,
            variantTitle: 'Ocarina of Time',
            variantImage: './img/zelda-oot.jpg'
          },
          {
            variantId: 2,
            variantTitle: 'Majora\'s Mask',
            variantImage: './img/zelda-mm.jpg'
          }
        ],
        addNumber: 1,
        cart: 0
      },
      methods: {
        addToCart() {
          const result = this.inventory - parseInt(this.addNumber);
          if (result >= 0) {
            this.inventory = result;
            this.cart += parseInt(this.addNumber);
          }
        },
        removeFromCart() {
          if (this.cart > 0) {
            this.inventory += 1;
            this.cart -= 1;
          }
        },
        clearCart() {
          this.inventory += this.cart;
          this.cart = 0;
        },
        changeVersion(event) {
          const result = this.variants.find(obj => {
            return obj.variantId == event.target.value;
          });
          this.img = result.variantImage;
        },
        toggleSale() {
          this.onSale = (this.onSale) ? false : true;
        }
      }
    });
  </script>
</body>
</html>
